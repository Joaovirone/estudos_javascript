<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tipos de Dados</title>
</head>
<body>
    <h1>Tipos de Dados</h1>
    <p id="dado1">A variável a é do tipo: </p>
    <p id="dado2">A variável b é do tipo: </p>
    <p id="dado3">A variável c é do tipo: </p>
    <p id="dado4">A variável d é do tipo: </p>
    <p id="dado5">A variável e é do tipo: </p>
    <p id="dado6">A variável f é do tipo: </p>
    <p id="dado7">A variável g é do tipo: </p>

    <script>
        var a;
        var b = 1;
        var c = [1,2,3,4,5];
        var d = ['azul', 'preto', 'cinza'];
        var e = 'Javascript';
        var f = false;
        var g = null;

        document.getElementById('dado1').innerHTML += a
        document.getElementById('dado2').innerHTML += b
        document.getElementById('dado3').innerHTML += c[2]
        document.getElementById('dado4').innerHTML += d 
        document.getElementById('dado5').innerHTML += e 
        document.getElementById('dado6').innerHTML += f
        document.getElementById('dado7').innerHTML += g

    </script>
</body>
